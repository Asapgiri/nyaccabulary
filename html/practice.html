<style>
body {
    background: #fafafa;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

/* reset */
.form-control,
.btn {
    border-radius: 0 !important;
}

/* page */
.container {
    max-width: 640px;
}

/* header */
h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
}

/* CARD = quiet study sheet */
.practice-card {
    background: #fff;
    border: 1px solid #e6e6e6;
    padding: 40px 24px;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
}

/* main word */
.practice-word {
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* secondary info */
.practice-sub {
    font-size: 16px;
    color: #555;
    margin-top: 10px;
}

/* subtle hint */
#tapHint {
    margin-top: 22px;
    font-size: 13px;
    color: #999;
}

/* hidden state = invisible but stable layout feel */
.hidden {
    display: none;
}

/* ANSWERS = planner-style row, not game buttons */
.answer-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 14px;
}

/* minimal buttons */
.answer-btn {
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
    padding: 10px 0;
    cursor: pointer;
    transition: border 0.15s ease, background 0.15s ease;
}

/* hover = only slight emphasis */
.answer-btn:hover {
    border-color: #000;
}

/* semantic colors only on text, not loud backgrounds */
.btn-again { color: #b00020; }
.btn-hard  { color: #b26a00; }
.btn-good  { color: #1b5e20; }
.btn-easy  { color: #0b57d0; }

/* reveal area spacing */
.reveal-area {
    margin-top: 12px;
}
</style>

<div class="container py-4">

    <h2>Practice</h2>

    {{if .Dto.Id}}

    <!-- STUDY SHEET -->
    <div id="card" class="practice-card" onclick="reveal()">

        <div>
            <div class="practice-word">
                {{.Dto.Kanji}}
            </div>

            <div id="kana" class="practice-sub hidden">
                {{.Dto.Kana}}
            </div>

            <div id="meaning" class="practice-sub hidden">
                {{.Dto.Meaning}}
            </div>

            <div id="tapHint" class="practice-sub">
                tap to reveal
            </div>
        </div>

    </div>

    <!-- ANSWERS (planner bar) -->
    <div id="buttons" class="answer-bar hidden">

        <button class="answer-btn btn-again" onclick="grade('again')">Again</button>
        <button class="answer-btn btn-hard" onclick="grade('hard')">Hard</button>
        <button class="answer-btn btn-good" onclick="grade('good')">Good</button>
        <button class="answer-btn btn-easy" onclick="grade('easy')">Easy</button>

    </div>

    {{else}}

    <p style="color:#888;">No words available.</p>

    {{end}}

</div>

<script>
function reveal() {
    document.getElementById("kana").classList.remove("hidden");
    document.getElementById("meaning").classList.remove("hidden");
    document.getElementById("buttons").classList.remove("hidden");
    document.getElementById("tapHint").classList.add("hidden");
}

function grade(level) {
    fetch("/learn/{{.Dto.Id}}/" + level, {
        method: "POST",
        credentials: "include",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ grade: level })
    }).then(() => location.reload());
}
</script>
