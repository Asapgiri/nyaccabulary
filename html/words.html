<style>
.hover-scale {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.hover-scale:hover {
    transform: scale(1.05);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
</style>

<div class="container py-4" style="max-width: 800px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Words</h2>

        <form method="GET">
            <div class="form-check form-switch">
                <input
                    class="form-check-input"
                    type="checkbox"
                    name="mastered"
                    id="showMastered"
                    {{if .Dto.ShowMastered}}checked{{end}}
                    onchange="this.form.submit()">
                <label class="form-check-label" for="showMastered">
                    Show Mastered
                </label>
            </div>
        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <div class="d-flex flex-wrap gap-2">

                {{range .Dto.Words}}
                <a class="badge rounded-pill px-3 py-2 fs-6 {{if .Mastered}} bg-success-subtle text-success border border-success {{else}} text-bg-light text-dark border {{end}} text-decoration-none transition hover-scale" href="/{{.Kanji}}">
                    {{.Kanji}}
                </a>
                {{end}}

            </div>

        </div>
    </div>

</div>
