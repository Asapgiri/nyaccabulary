<link href="/words.css" rel="stylesheet">

<div class="container py-4">

    <div class="study-header">

        <!-- LEFT -->
        <div class="study-title">Words</div>

        <!-- CENTER -->
        <div id="study-progress" class="study-progress"></div>

        <!-- RIGHT -->
        <div class="study-controls">

            <!-- Toggle -->
            <form method="GET">
                <!-- always send false by default -->
                <input type="hidden" name="mastered" value="{{not .Dto.ShowMastered}}">
                <label class="study-toggle">
                    <input class="form-check-input"
                    type="checkbox"
                    name="mastered"
                    id="showMastered"
                    {{if .Dto.ShowMastered}}checked{{end}}
                    onchange="this.form.submit()">
                    Show mastered
                </label>
            </form>

            <!-- Actions -->
            <div class="study-actions">
                <button type="button" class="btn btn-outline-primary btn-mini" id="copy-btn">Copy</button>
                <a href="/word/sync" class="btn btn-outline-primary btn-mini">Sync</a>
                <a href="/word/bulkadd" class="btn btn-outline-secondary btn-mini">Bulk</a>
                <a href="/word/pdf?mastered={{.Dto.ShowMastered}}" class="btn btn-outline-success btn-mini">PDF</a>
            </div>

        </div>

    </div>

    <input id="wordSearch" class="form-control form-control-sm" placeholder="Search...">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <div class="word-grid" id="word-grid">
            </div>

        </div>
    </div>

</div>

<template id="template-chip">
    <span class="searchable chip">
        <button class='word-chip' data-bs-toggle="modal"></button>

        {{template "template_word_modal"}}
    </span>
</template>


<script>
document.getElementById("wordSearch").addEventListener("input", function() {
    const q = this.value.toLowerCase();

    document.querySelectorAll(".searchable").forEach(row => {
        row.style.display =
            row.textContent.toLowerCase().includes(q)
                ? ""
                : "none";
    });
});

document.getElementById("copy-btn").addEventListener("click", function() {
    const chips = document.getElementsByClassName('chip')
    text = ""
    for (let i = 0; i < chips.length; i++) {
        text += chips[i].innerText + "\n"
    }
    navigator.clipboard.writeText(text);
});
</script>

<script src="/api.js"></script>
<script src="/words.js"></script>
