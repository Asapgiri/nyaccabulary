<link href="/index.css" rel="stylesheet">

<div class="container-fluid py-4 px-3 px-md-4" style="max-width:1000px;">

    <!-- Topbar -->
    <div class="topbar">
        <div class="page-title">Words</div>
        <div id="study-progress" class="study-progress"></div>
    </div>

    <!-- Add form -->
    <div class="add-form">
        <div class="row g-2">
            <div class="col-md-3">
                <input id="form[kanji]" name="form[kanji]" class="form-control clean-input" placeholder="Word (with kanjis)" lang="ja">
            </div>
            <div class="col-md-3">
                <input id="form[kana]" name="form[kana]" class="form-control clean-input" placeholder="Kana" lang="ja">
            </div>
            <div class="col-md-4">
                <input id="form[meaning]" name="form[meaning]" class="form-control clean-input" placeholder="Meaning">
            </div>
            <div class="col-md-2">
                <button class="btn btn-dark w-100" onclick="add_row();">Add</button>
            </div>
        </div>
    </div>

    <div id="filterBar" class="d-flex flex-wrap align-items-center gap-2 p-2 border">

        <!-- Status Filters -->
        <div class="btn-group" role="group" aria-label="Status Filters">

            <input type="checkbox" class="btn-check" id="status-mastered" onchange="filterer();">
            <label class="btn btn-outline-success btn-mini" for="status-mastered">
                Mastered
            </label>

            <input type="checkbox" class="btn-check" id="status-learning" onchange="filterer();">
            <label class="btn btn-outline-warning btn-mini" for="status-learning">
                Learning
            </label>

            <input type="checkbox" class="btn-check" id="status-unknown" onchange="filterer();">
            <label class="btn btn-outline-secondary btn-mini" for="status-unknown">
                Unknown
            </label>

            <input type="checkbox" class="btn-check" id="status-new" onchange="filterer();">
            <label class="btn btn-outline-info btn-mini" for="status-new">
                New
            </label>

        </div>

        <!-- Sort Field -->
        <select id="sortField" class="form-select form-select-sm" style="width: auto;" onchange="filterer();">
            <option value="date">Date Added</option>
            <option value="word">Word</option>
            <option value="mastery">Mastery</option>
            <option value="last_updated">Last Updated</option>
        </select>

        <!-- Sort Direction -->
        <div class="btn-group">
            <button id="sortAsc" class="btn btn-outline-secondary btn-mini" data-order="1" onclick="filterer(this);">
                ↑
            </button>

            <button id="sortDesc" class="btn btn-outline-secondary btn-mini" data-order="-1" onclick="filterer(this);">
                ↓
            </button>
        </div>

        <button id="resetFilter" class="btn btn-outline-secondary btn-mini" onclick="filter_reset();">
            Reset
        </button>

    </div>

    <input id="wordSearch" class="form-control form-control-sm" placeholder="Search...">

    <!-- Header -->
    <div class="row planner-header">
        <div class="col-3 col-md-3 col-sm-3">WORD</div>
        <div class="col-3 col-md-3 col-sm-3">KANA</div>
        <div class="col-4 col-md-3 col-sm-4">MEANING</div>
        <div class="col-md-2 d-none d-md-block">PROGRESS</div>
        <div class="col-2 col-md-1 col-sm-2" style="text-align:right;">ACTIONS</div>
    </div>

    <div id="planner-box">
    </div>

</div>

<template id="template-row">
    <div class='row planner-row'>
        <button class='col-3 col-md-3 col-sm-3 word-chip' data-bs-toggle="modal"></button>

        <div class="col-3 col-md-3 col-sm-3 kana"></div>
        <div class="col-4 col-md-3 col-sm-4 meaning"></div>

        <div class="col-md-2 d-none d-md-block">
            <div class="mini-bar">
                <div class="bad"></div>
                <div class="good"></div>
            </div>
        </div>

        <div class="col-2 col-md-1 col-sm-2 actions">
            <button class="icon-btn icon-btn-master" type="button" title="Mark mastered">＋</button>
            <button class="icon-btn icon-btn-delete" type="button" title="Delete">×</button>
        </div>

        {{template "template_word_modal"}}

    </div>
</template>

<script>
document.getElementById("wordSearch").addEventListener("input", function() {
    const q = this.value.toLowerCase();

    document.querySelectorAll(".planner-row").forEach(row => {
        row.style.display =
            row.textContent.toLowerCase().includes(q)
                ? ""
                : "none";
    });
});
</script>

<script src="/api.js"></script>
<script src="/index.js"></script>
