<link href="/index.css" rel="stylesheet">

<script>
document.getElementById("wordSearch").addEventListener("input", function() {
    const q = this.value.toLowerCase();

    document.querySelectorAll(".planner-row").forEach(row => {
        row.style.display =
            row.textContent.toLowerCase().includes(q)
                ? ""
                : "none";
    });
});
</script>

<div class="container-fluid py-4 px-3 px-md-4" style="max-width:1000px;">

    <!-- Topbar -->
    <div class="topbar">
        <div class="page-title">Words</div>
        <form method="GET">
            <div class="form-check form-switch">
                <!-- always send false by default -->
                <input type="hidden" name="mastered" value="{{not .Dto.ShowMastered}}">
                <input class="form-check-input"
                       type="checkbox"
                       name="mastered"
                       id="showMastered"
                       {{if .Dto.ShowMastered}}checked{{end}}
                       onchange="this.form.submit()">
                <label class="form-check-label" for="showMastered">Show Mastered</label>
            </div>
        </form>
    </div>

    <!-- Add form -->
    <form method="POST" action="/word/save" class="add-form">
        <div class="row g-2">
            <div class="col-md-3">
                <input name="form[kanji]" class="form-control clean-input" placeholder="Word (with kanjis)" lang="ja">
            </div>
            <div class="col-md-3">
                <input name="form[kana]" class="form-control clean-input" placeholder="Kana" lang="ja">
            </div>
            <div class="col-md-4">
                <input name="form[meaning]" class="form-control clean-input" placeholder="Meaning">
            </div>
            <div class="col-md-2">
                <button class="btn btn-dark w-100">Add</button>
            </div>
        </div>
    </form>

    <input id="wordSearch" class="form-control form-control-sm" placeholder="Search...">

    <!-- Header -->
    <div class="row planner-header">
        <div class="col-3 col-md-3 col-sm-3">WORD</div>
        <div class="col-3 col-md-3 col-sm-3">KANA</div>
        <div class="col-4 col-md-3 col-sm-4">MEANING</div>
        <div class="col-md-2 d-none d-md-block">PROGRESS</div>
        <div class="col-2 col-md-1 col-sm-2" style="text-align:right;">ACTIONS</div>
    </div>

    <!-- Rows -->
    {{range $i, $d := .Dto.Words}}
    <div class='row planner-row {{if eq .Status "MASTERED"}}mastered{{end}} {{if eq .Status "LEARNING"}}learning{{end}} {{if eq .Status "NEW"}}new{{end}}'>

        <!-- Word -->
        <a class='col-3 col-md-3 col-sm-3 word-chip {{if eq .Status "MASTERED"}}mastered{{end}} {{if eq .Status "LEARNING"}}learning{{end}} {{if eq .Status "NEW"}}new{{end}}'
            data-bs-toggle="modal"
            data-bs-target="#word-{{.Id}}">
            {{.Kanji}}
        </a>

        <!-- Kana & Meaning -->
        <div class="col-3 col-md-3 col-sm-3 kana">{{.Kana}}</div>
        <div class="col-4 col-md-3 col-sm-4 meaning">{{.Meaning}}</div>

        <!-- Mini bar -->
        <div class="col-md-2 d-none d-md-block">
            {{if not (eq .Status "MASTERED")}}
            <div class="mini-bar">
                <div class="bad" style="width: {{.Display.PercentageN}}%"></div>
                <div class="good" style="width: {{.Display.PercentageP}}%"></div>
            </div>
            {{end}}
        </div>

        <!-- Actions -->
        <div class="col-2 col-md-1 col-sm-2 actions">
            {{if eq .Status "MASTERED"}}
            <a class="icon-btn icon-btn-unmaster" href="/word/mastered/unset/{{.Id}}" title="Unmaster">⟲</a>
            {{else}}
            <a class="icon-btn icon-btn-master" href="/word/mastered/set/{{.Id}}" title="Mark mastered">✓</a>
            {{end}}
            <a class="icon-btn icon-btn-delete" href="/word/delete/{{.Id}}" title="Delete">×</a>
        </div>

        {{template "word_modal" .}}

    </div>
    {{end}}

</div>
