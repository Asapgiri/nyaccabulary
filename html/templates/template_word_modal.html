{{define "template_word_modal"}}
<div class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header study-modal-header">

                <!-- Title block -->
                <div class="study-title">
                    <div class="study-kanji"></div>
                    <div class="study-kana"></div>
                </div>

                <!-- Actions -->
                <div class="study-actions">

                    <button type="button" class="icon-btn btn-mastered">Mastered</button>
                    <button type="button" class="icon-btn btn-master">Master</button>
                    <button type="button" class="icon-btn btn-mark">Mark</button>

                    <button type="button" class="icon-btn btn-delete">Delete</button>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

            </div>

            <div class="modal-body">
                <p><strong>Meaning:</strong> <span class="modal-meaning"></span></p>
                <hr>

                <p>
                <strong>Kanjis:</strong>
                <span class="modal-kanjis"></span>
                </p>
                <hr>


                <h6>Kanji</h6>
                <ul class="modal-kanji">
                </ul>

                <h6>Readings</h6>
                <ul class="modal-readings">
                </ul>

                <h6>Senses</h6>
                <div class="modal-senses"></div>

            </div>
        </div>
    </div>
</div>
{{end}}
