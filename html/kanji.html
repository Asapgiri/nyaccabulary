<link href="/kanji.css" rel="stylesheet">

<script>
document.getElementById("wordSearch").addEventListener("input", function() {
    const q = this.value.toLowerCase();

    document.querySelectorAll(".searchable").forEach(row => {
        row.style.display =
            row.textContent.toLowerCase().includes(q)
                ? ""
                : "none";
    });
});
</script>

<div class="container py-4">

    <div class="study-header">

        <!-- LEFT -->
        <div class="study-title">Kanjis</div>

        <!-- CENTER -->
        <div class="study-progress">{{.Dto.Mastered}} / {{.Dto.KanjiCount}}</div>

        <!-- RIGHT -->
        <div class="study-controls">

            <!-- Toggle -->
            <form method="GET">
                <!-- always send false by default -->
                <input type="hidden" name="mastered" value="{{not .Dto.ShowMastered}}">
                <label class="study-toggle">
                    <input class="form-check-input"
                    type="checkbox"
                    name="mastered"
                    id="showMastered"
                    {{if .Dto.ShowMastered}}checked{{end}}
                    onchange="this.form.submit()">
                    Show mastered
                </label>
            </form>

            <!-- Actions -->
            <div class="study-actions">
                <a href="/kanji/sync" class="btn btn-outline-primary btn-mini">Sync</a>
                <a href="/kanji/pdf?mastered={{.Dto.ShowMastered}}" class="btn btn-outline-success btn-mini">PDF</a>
            </div>

        </div>

    </div>

    <input id="wordSearch" class="form-control form-control-sm" placeholder="Search...">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <div class="word-grid">
                {{range .Dto.Kanjis}}
                <span class="searchable">
                    <a class='word-chip {{if eq .Status "MASTERED"}}mastered{{end}} {{if eq .Status "LEARNING"}}learning{{end}} {{if eq .Status "NEW"}}new{{end}}'
                        data-bs-toggle="modal"
                        data-bs-target="#kanji-{{.Id}}">
                        <div>{{.Kanji}}</div>
                    </a>
                    {{template "kanji_modal" .}}
                </span>
                {{end}}
            </div>

        </div>
    </div>

</div>
