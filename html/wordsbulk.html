<div class="container">
    <div class="row justify-content-center">

        <div class="card shadow-sm border-0">
            <div class="card-body">

                <h1 class="h3 mb-3">Add Words</h1>
                <p class="text-muted mb-4">
                Enter one or more words. You can paste multiple words, one per line.</br>
                kanjis[(,|、)furigana][(,|、)meaning][(+|＋)]</br>
                kanjis[,meaning][＋]</br>
                </p>

                <form method="post">
                    <div class="mb-4">
                        <label for="words" class="form-label fw-semibold">
                            Words
                        </label>

                        <textarea
                            id="words"
                            name="form[words]"
                            class="form-control"
                            rows="15"
                            placeholder="本[,ほん][,book][＋]&#10;猫&#10;学校&#10;..."
                            required
                            ></textarea>

                        <div class="form-text">
                            One word per line.
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Submit Words
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
